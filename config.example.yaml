# Copy to ops-config.yaml and install into $HERMES_HOME or ~/.hermes/
#   cp config.example.yaml ops-config.yaml
#   python install/install.py --config ops-config.yaml

timezone: America/Chicago
ui_port: 8888
notify_window:
  weekdays: [0, 1, 2, 3, 4] # Monday=0
  start: "09:00"
  end: "17:00"
  always_allow_jobs: [f6ops2100] # daily report

# Root folder that contains your local product checkouts
projects_root: /path/to/your/projects

github:
  org: your-org
  repos:
    - name: example-app
      slug: your-org/example-app
      critical_workflows:
        - CI

# Roadmap / UI product keys (usually match repo names)
products:
  - example-app

# Local health checks for project-sentinel.py
# Each check is [label, [argv...]]
# Optional argv placeholders (resolved at runtime; missing tool → UNAVAILABLE, not FAIL):
#   {python} {node} {ruff} {tsc} {eslint} {go} {gradlew}
projects:
  example-app:
    path: example-app
    checks:
      - [Compile check, ["echo", "configure me"]]
      # Examples (uncomment / adapt):
      # - [Lint, ["{ruff}", "check", ".", "--statistics"]]
      # - [Types, ["{tsc}", "--noEmit"]]
      # - [Go vet, ["{go}", "vet", "./..."]]
      # - [Gradle verify, ["{gradlew}", "verify", "--no-daemon"]]

tracked_branches:
  - main
  - trunk
  - dev
  - qa

# Optional: read-only GCP Cloud Run / Functions / billing scan (gcloud-ops-scan.py)
# See docs/GCLOUD_OPS_SETUP.md. SA key: HERMES_GCLOUD_SA_KEY or $HERMES_HOME/secrets/gcloud-ops.json
# Also set features.gcloud_ops: true and create cron h12gcloud0730 when ready.
gcloud:
  enabled: false
  projects: [] # [{id, label, region, watch_run_services, enabled}]
  # projects:
  #   - id: your-gcp-project-id
  #     label: example-dev
  #     region: us-central1
  #     watch_run_services: []
  #     enabled: true
  thresholds: {}
  # thresholds:
  #   cloud_run_error_logs_1h: 25
  #   daily_cost_usd_warn: 50.0
  billing_account_ids: []
  billing_account_id: ""

# Optional: UI/e2e GHA scan + config-driven local live checks (ui-live-scan.py)
# Local runs require HERMES_UI_LIVE_RUN=1; URLs via HERMES_LIVE_* or live_urls.json
# (separate from models.ui_live provider/model and features.ui_live cron flag)
ui_live:
  enabled: false
  local_checks: []
  # local_checks:
  #   - label: example live e2e
  #     cwd: example-app/frontend
  #     cmd: ["{npx}", "playwright", "test", "e2e/live.spec.ts"]
  #     url_env: HERMES_LIVE_APP_URL
  #     extra_env: {}

# Day/night model ladder (portable design):
#   Bonsai → PM / market / ops-review
#   Day Grok → executor (09/11/13/15)
#   Codex Sol → CI autofix + night executor
#   Grok → UI live evening scan
models:
  pm:
    provider: bonsai-local
    model: bonsai-27b
  market:
    provider: bonsai-local
    model: bonsai-27b
  ops_review:
    provider: bonsai-local
    model: bonsai-27b
  autofix:
    provider: openai-codex
    model: gpt-5.6-sol
  executor:
    provider: xai-oauth
    model: grok-4.5
  executor_night:
    provider: openai-codex
    model: gpt-5.6-sol
  ui_live:
    provider: xai-oauth
    model: grok-4.5
  # Day executor Hermes fallback_providers (in-flight slice only):
  #   1) xai-oauth / grok-composer-2.5-fast
  #   2) openai-codex / gpt-5.6-sol
  # Night executor: empty fallback_providers (hard stop on 429).

# Optional advanced topology — jobs are always in jobs.template.json;
# disable unused ones in the live cron registry after render.
features:
  night_executor: true   # d4execnight (deliver=local, Codex only)
  ui_live: true          # h11uilive23 — needs ui-live-scan.py
  gcloud_ops: false      # h12gcloud0730 — needs SA + gcloud-ops-scan.py
  checkin_ui: true       # http://127.0.0.1:8888/checkin
